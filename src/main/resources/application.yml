spring:
  application:
    name: tomatoma-backend

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/tomatoma
    driver-class-name: org.postgresql.Driver
    username: tomatoma_user
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # CORS Configuration
  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:5173,http://localhost:5174"
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Google APIs Configuration
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:your_google_maps_api_key}
  places:
    api-key: ${GOOGLE_MAPS_API_KEY:your_google_maps_api_key}

# External APIs Configuration
external-apis:
  serpapi:
    api-key: ${SERPAPI_API_KEY:placeholder_serpapi_key}
    base-url: https://serpapi.com

# Scheduler Configuration
scheduler:
  trend:
    cron: "0 0 * * * ?" # Every hour
  enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.tomatoma: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
